<!DOCTYPE html>
<html>
<head>
    <title>Dublin Port Ferries</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f4; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #003366; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .updated { text-align: center; margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <h1>Dublin Port – Scheduled Ferries</h1>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Vessel</th>
                <th>Type</th>
                <th>Berth</th>
                <th>Origin</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div class="updated" id="updated"></div>

    <script>
        async function loadData() {
            try {
                const res = await fetch("arrivals.json");
                const data = await res.json();

                const body = document.getElementById("tableBody");
                body.innerHTML = "";

                data.forEach(item => {
                    body.innerHTML += `
                        <tr>
                            <td>${item.date}</td>
                            <td>${item.time}</td>
                            <td>${item.vessel}</td>
                            <td>${item.type}</td>
                            <td>${item.berth}</td>
                            <td>${item.origin}</td>
                        </tr>
                    `;
                });

                document.getElementById("updated").innerText =
                    "Last updated: " + new Date().toLocaleString();
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        loadData();
        setInterval(loadData, 60 * 60 * 1000); // refresh every hour
    </script>
</body>
</html>
