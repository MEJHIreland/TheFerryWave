<!DOCTYPE html>
<html>
<head>
    <title>Dublin Port Arrivals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .updated {
            margin-top: 10px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<h1>Dublin Port – Next Arrivals</h1>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Vessel</th>
            <th>Type</th>
            <th>Berth</th>
            <th>Origin</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div class="updated" id="updated"></div>

<script>
async function loadArrivals() {
    try {
        const response = await fetch("arrivals.json");
        const data = await response.json();

        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        data.forEach(item => {
            const row = `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.time}</td>
                    <td>${item.vessel}</td>
                    <td>${item.type}</td>
                    <td>${item.berth}</td>
                    <td>${item.origin}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        document.getElementById("updated").innerText =
            "Last updated: " + new Date().toLocaleString();

    } catch (error) {
        console.error("Error loading data:", error);
    }
}

loadArrivals();
</script>

</body>
</html>
